<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会話ネタジェネレーター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 { font-size: 1.4rem; color: #555; letter-spacing: 0.05em; margin-bottom: 24px; }

    .level-selector { display: flex; gap: 12px; margin-bottom: 32px; }

    .level-btn {
      padding: 10px 28px;
      border: 2px solid #ccc;
      border-radius: 999px;
      background: white;
      font-size: 1rem;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
      font-family: inherit;
    }
    .level-btn:hover { border-color: #4A90D9; color: #4A90D9; }
    .level-btn.active { background: #4A90D9; border-color: #4A90D9; color: white; font-weight: bold; }

    .category-selector {
      display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
      width: 100%; max-width: 680px; justify-content: center;
    }
    .cat-btn {
      padding: 6px 16px; border: 2px solid #ddd; border-radius: 999px;
      background: white; font-size: 0.82rem; cursor: pointer; color: #888;
      transition: all 0.2s; font-family: inherit; white-space: nowrap;
    }
    .cat-btn:hover { border-color: #4A90D9; color: #4A90D9; }
    .cat-btn.active { background: #f0f6ff; border-color: #4A90D9; color: #4A90D9; font-weight: bold; }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 680px;
      padding: 48px 40px 32px;
      margin-bottom: 20px;
    }

    .topic-label { font-size: 0.8rem; color: #aaa; letter-spacing: 0.1em; margin-bottom: 20px; }

    .topic-text {
      font-size: 2rem;
      color: #222;
      line-height: 2.8;
      margin-bottom: 32px;
      min-height: 80px;
    }

    rt { font-size: 0.5em; color: #555; font-weight: normal; vertical-align: top; }

    .accordion { border-top: 1px solid #eee; }

    .accordion-btn {
      width: 100%;
      padding: 16px 0;
      background: none;
      border: none;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 0.95rem;
      color: #4A90D9;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: inherit;
      transition: color 0.2s;
    }
    .accordion-btn:hover { color: #2a70b9; }
    .accordion-btn .arrow { transition: transform 0.3s; font-style: normal; }
    .accordion-btn.open .arrow { transform: rotate(180deg); }

    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .accordion-inner { padding: 16px 0 20px; }

    .english-text { font-size: 1.3rem; color: #444; line-height: 1.6; }

    .hint-section { margin-bottom: 12px; }
    .hint-label { font-size: 0.8rem; color: #aaa; font-weight: bold; letter-spacing: 0.08em; margin-bottom: 8px; }
    .hint-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { background: #f0f4f8; border-radius: 999px; padding: 5px 14px; font-size: 0.9rem; color: #444; }
    .tag.grammar { background: #fff8e8; color: #b07d00; }
    .tag.grammar-clickable { cursor: pointer; border-bottom: 2px dotted #b07d00; transition: background 0.15s; }
    .tag.grammar-clickable:hover { background: #fff0cc; }
    .tag.followup { background: #f0faf4; color: #2d8a4e; }
    .accordion-content.open { max-height: 400px; }

    .btn-row { display: flex; gap: 12px; width: 100%; max-width: 680px; }
    .btn { flex: 1; padding: 16px; border-radius: 14px; font-size: 1rem; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-skip { background: white; color: #888; border: 2px solid #ddd; }
    .btn-skip:hover { border-color: #aaa; color: #555; }
    .btn-next { background: #4A90D9; color: white; font-weight: bold; font-size: 1.1rem; }
    .btn-next:hover { background: #2a70b9; }

    .topic-count { margin-top: 8px; font-size: 0.8rem; color: #bbb; }

    /* カードヘッダー */
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .fav-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; padding: 4px; line-height: 1; transition: transform 0.2s; }
    .fav-btn:hover { transform: scale(1.2); }

    /* タイマー */
    .timer-section { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .timer-display { font-size: 1.5rem; font-weight: bold; color: #555; min-width: 64px; text-align: center; }
    .timer-display.running { color: #e05c5c; }
    .timer-display.done { color: #27ae60; }
    .timer-btn { padding: 8px 18px; border-radius: 999px; border: 2px solid #ddd; background: white; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: all 0.2s; color: #666; }
    .timer-btn:hover { border-color: #4A90D9; color: #4A90D9; }
    .timer-btn.stop { border-color: #e05c5c; color: #e05c5c; }

    /* 履歴・お気に入りパネル */
    .bottom-toggles { display: flex; gap: 20px; margin-top: 8px; }
    .panel-toggle { background: none; border: none; font-size: 0.85rem; cursor: pointer; padding: 4px; font-family: inherit; color: #aaa; transition: color 0.2s; }
    .panel-toggle:hover { color: #777; }
    .fav-toggle { color: #d4a800 !important; }
    .fav-toggle:hover { color: #b08900 !important; }
    .slide-panel { width: 100%; max-width: 680px; background: white; border-radius: 16px; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.35s; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .slide-panel.open { max-height: 400px; padding: 20px 24px; overflow-y: auto; }
    .panel-title { font-size: 0.8rem; color: #aaa; letter-spacing: 0.08em; margin-bottom: 12px; font-weight: bold; }
    .history-item, .fav-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; color: #444; display: flex; align-items: center; gap: 8px; }
    .history-item:last-child, .fav-item:last-child { border-bottom: none; }
    .history-num { color: #ccc; font-size: 0.8rem; min-width: 18px; }
    .level-tag { font-size: 0.72rem; background: #e8f0fb; color: #4A90D9; padding: 2px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .fav-item { justify-content: space-between; }
    .fav-item-left { display: flex; align-items: center; gap: 8px; flex: 1; }
    .fav-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 1rem; padding: 4px; flex-shrink: 0; transition: color 0.2s; }
    .fav-del:hover { color: #e05c5c; }
    .empty-msg { color: #ccc; font-size: 0.9rem; text-align: center; padding: 16px 0; }

    /* 文型モーダル */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 20px;
      padding: 36px 28px 28px;
      max-width: 480px; width: 90%;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      font-size: 1.2rem; cursor: pointer;
      color: #bbb; line-height: 1; padding: 4px;
    }
    .modal-close:hover { color: #555; }
    .modal-pattern {
      font-size: 1.35rem; font-weight: bold;
      color: #b07d00; background: #fff8e8;
      border-radius: 10px; padding: 12px 16px;
      margin-bottom: 20px;
    }
    .modal-section-label {
      font-size: 0.78rem; color: #aaa;
      font-weight: bold; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .modal-usage {
      font-size: 1rem; color: #444;
      line-height: 2; margin-bottom: 20px;
      padding: 12px 16px; background: #f8f9fa;
      border-radius: 10px;
    }
    .modal-usage rt { font-size: 0.55em; color: #888; }
    .modal-usage-en { font-size: 0.85rem; color: #999; margin-top: 4px; line-height: 1.5; }
    .modal-examples { display: flex; flex-direction: column; gap: 8px; }
    .modal-example {
      font-size: 1.05rem; color: #333;
      line-height: 2.4; padding: 10px 16px;
      background: #f0f4f8; border-radius: 10px;
    }
    .modal-example rt { font-size: 0.55em; color: #888; }
    .modal-example-en { font-size: 0.85rem; color: #999; line-height: 1.5; margin-top: 2px; }
  </style>
</head>
<body>

  <h1>会話ネタジェネレーター</h1>

  <div class="level-selector">
    <button class="level-btn active" onclick="setLevel('beginner', this)">初級</button>
    <button class="level-btn" onclick="setLevel('intermediate', this)">中級</button>
    <button class="level-btn" onclick="setLevel('advanced', this)">上級</button>
  </div>

  <div class="category-selector" id="cat-selector"></div>

  <div class="card">
    <div class="card-top">
      <div class="topic-label">TODAY'S TOPIC</div>
      <button class="fav-btn" id="fav-btn" onclick="toggleFavorite()" title="お気に入りに追加">☆</button>
    </div>
    <div class="topic-text" id="topic-text">ボタンを<ruby>押<rt>お</rt></ruby>してネタを<ruby>出<rt>だ</rt></ruby>してください。</div>

    <div class="accordion">
      <button class="accordion-btn" id="eng-btn" onclick="toggleAccordion('eng')">
        英語訳を見る <i class="arrow">▼</i>
      </button>
      <div class="accordion-content" id="eng-content">
        <div class="accordion-inner">
          <div class="english-text" id="english-text">—</div>
        </div>
      </div>

      <button class="accordion-btn" id="hint-btn" onclick="toggleAccordion('hint')">
        💡 ヒントを見る（単語・文型） <i class="arrow">▼</i>
      </button>
      <div class="accordion-content" id="hint-content">
        <div class="accordion-inner">
          <div class="hint-section">
            <div class="hint-label">📝 単語</div>
            <div class="hint-tags" id="vocab-tags"></div>
          </div>
          <div class="hint-section">
            <div class="hint-label">📐 文型 <span id="grammar-hint-note" style="font-size:0.75rem;color:#ccc;font-weight:normal;margin-left:6px;"></span></div>
            <div class="hint-tags" id="grammar-tags"></div>
          </div>
        </div>
      </div>

      <button class="accordion-btn" id="followup-btn" onclick="toggleAccordion('followup')">
        💬 フォローアップ質問 <i class="arrow">▼</i>
      </button>
      <div class="accordion-content" id="followup-content">
        <div class="accordion-inner">
          <div class="hint-tags" id="followup-tags"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-skip" onclick="skip()">スキップ</button>
    <button class="btn btn-next" onclick="next()">次のネタ 🎲</button>
  </div>
  <div class="timer-section">
    <div class="timer-display" id="timer-display">--:--</div>
    <button class="timer-btn" onclick="startTimer(3)">3分</button>
    <button class="timer-btn" onclick="startTimer(5)">5分</button>
    <button class="timer-btn stop" id="timer-stop" onclick="stopTimer()" style="display:none">■ 停止</button>
  </div>
  <div class="topic-count" id="topic-count"></div>
  <div class="bottom-toggles">
    <button class="panel-toggle" onclick="togglePanel('history-panel')">📋 履歴（<span id="history-count">0</span>件）</button>
    <button class="panel-toggle fav-toggle" onclick="togglePanel('fav-panel')">⭐ お気に入り（<span id="fav-count">0</span>件）</button>
  </div>
  <div class="slide-panel" id="history-panel"></div>
  <div class="slide-panel" id="fav-panel"></div>

  <!-- 文型モーダル -->
  <div class="modal-overlay" id="grammar-modal" onclick="closeGrammarModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeGrammarModal()">✕</button>
      <div class="modal-pattern" id="modal-pattern"></div>
      <div class="modal-section-label">📖 使い方</div>
      <div class="modal-usage" id="modal-usage"></div>
      <div class="modal-section-label">💬 例文</div>
      <div class="modal-examples" id="modal-examples"></div>
    </div>
  </div>

<script>
const topics = {
  beginner: [
    {
      japanese: "<ruby>今日<rt>きょう</rt></ruby>の<ruby>朝<rt>あさ</rt></ruby>ごはんは<ruby>何<rt>なん</rt></ruby>でしたか？",
      english: "What did you have for breakfast today?",
      vocab: ["朝ごはん (breakfast)", "食べる (to eat)", "おいしい (delicious)", "〜が好き (like ~)"],
      grammar: [
        { pattern: "〜を食べました", usage: "<ruby>過去<rt>かこ</rt></ruby>に<ruby>食<rt>た</rt></ruby>べたものを<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used when saying what you ate in the past", examples: ["パンを<ruby>食<rt>た</rt></ruby>べました。", "たまごを<ruby>食<rt>た</rt></ruby>べました。", "ごはんを<ruby>食<rt>た</rt></ruby>べました。"], examples_en: ["I ate bread.", "I ate eggs.", "I ate rice."] },
        { pattern: "〜が好きです", usage: "<ruby>好<rt>す</rt></ruby>きなものを<ruby>伝<rt>つた</rt></ruby>えるとき", usage_en: "Used to say what you like", examples: ["コーヒーが<ruby>好<rt>す</rt></ruby>きです。", "パンが<ruby>好<rt>す</rt></ruby>きです。"], examples_en: ["I like coffee.", "I like bread."] },
        { pattern: "毎朝〜します", usage: "<ruby>毎朝<rt>まいあさ</rt></ruby>する<ruby>習慣<rt>しゅうかん</rt></ruby>を<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used to say what you do every morning (habit)", examples: ["<ruby>毎朝<rt>まいあさ</rt></ruby>コーヒーを<ruby>飲<rt>の</rt></ruby>みます。", "<ruby>毎朝<rt>まいあさ</rt></ruby>シャワーを<ruby>浴<rt>あ</rt></ruby>びます。"], examples_en: ["I drink coffee every morning.", "I take a shower every morning."] }
      ],
      followup: ["毎朝食べますか？", "一番好きな朝ごはんは何ですか？", "朝ごはんを自分で作りますか？"]
    },
    {
      japanese: "<ruby>好<rt>す</rt></ruby>きな<ruby>食<rt>た</rt></ruby>べ<ruby>物<rt>もの</rt></ruby>は<ruby>何<rt>なん</rt></ruby>ですか？",
      english: "What is your favorite food?",
      vocab: ["好き (favorite/like)", "食べ物 (food)", "甘い (sweet)", "辛い (spicy)", "おいしい (delicious)"],
      grammar: [
        { pattern: "〜が好きです", usage: "<ruby>好<rt>す</rt></ruby>きなものを<ruby>伝<rt>つた</rt></ruby>えるとき", usage_en: "Used to say what you like", examples: ["すしが<ruby>好<rt>す</rt></ruby>きです。", "ラーメンが<ruby>好<rt>す</rt></ruby>きです。"], examples_en: ["I like sushi.", "I like ramen."] },
        { pattern: "〜は〜です", usage: "ものの<ruby>特徴<rt>とくちょう</rt></ruby>や<ruby>説明<rt>せつめい</rt></ruby>をするとき", usage_en: "Used to describe characteristics or explain what something is", examples: ["りんごは<ruby>甘<rt>あま</rt></ruby>いです。", "この<ruby>料理<rt>りょうり</rt></ruby>はおいしいです。"], examples_en: ["Apples are sweet.", "This dish is delicious."] },
        { pattern: "一番好きなのは〜です", usage: "<ruby>一番<rt>いちばん</rt></ruby><ruby>好<rt>す</rt></ruby>きなものを<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used to say your absolute favorite", examples: ["<ruby>一番<rt>いちばん</rt></ruby><ruby>好<rt>す</rt></ruby>きなのはラーメンです。", "<ruby>一番<rt>いちばん</rt></ruby><ruby>好<rt>す</rt></ruby>きなのはチョコレートです。"], examples_en: ["My favorite is ramen.", "My favorite is chocolate."] }
      ],
      followup: ["よく食べますか？", "自分で作れますか？", "子どもの頃から好きでしたか？"]
    },
    {
      japanese: "<ruby>今日<rt>きょう</rt></ruby>の<ruby>天気<rt>てんき</rt></ruby>はどうですか？",
      english: "How is the weather today?",
      vocab: ["天気 (weather)", "晴れ (sunny)", "雨 (rain)", "曇り (cloudy)", "寒い (cold)", "暑い (hot)"],
      grammar: [
        { pattern: "今日は〜です", usage: "<ruby>今日<rt>きょう</rt></ruby>の<ruby>状態<rt>じょうたい</rt></ruby>・<ruby>天気<rt>てんき</rt></ruby>を<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used to describe today's condition or weather", examples: ["<ruby>今日<rt>きょう</rt></ruby>は<ruby>晴<rt>は</rt></ruby>れです。", "<ruby>今日<rt>きょう</rt></ruby>は<ruby>寒<rt>さむ</rt></ruby>いです。"], examples_en: ["It's sunny today.", "It's cold today."] },
        { pattern: "〜ですね", usage: "<ruby>相手<rt>あいて</rt></ruby>に<ruby>共感<rt>きょうかん</rt></ruby>・<ruby>確認<rt>かくにん</rt></ruby>するとき", usage_en: "Used to agree with or seek confirmation from the other person", examples: ["いい<ruby>天気<rt>てんき</rt></ruby>ですね。", "<ruby>今日<rt>きょう</rt></ruby>は<ruby>暑<rt>あつ</rt></ruby>いですね。"], examples_en: ["Nice weather, isn't it?", "It's hot today, isn't it?"] },
        { pattern: "〜と思います", usage: "<ruby>自分<rt>じぶん</rt></ruby>の<ruby>意見<rt>いけん</rt></ruby>や<ruby>予想<rt>よそう</rt></ruby>を<ruby>伝<rt>つた</rt></ruby>えるとき", usage_en: "Used to express your opinion or prediction", examples: ["<ruby>明日<rt>あした</rt></ruby>は<ruby>雨<rt>あめ</rt></ruby>だと<ruby>思<rt>おも</rt></ruby>います。", "<ruby>今日<rt>きょう</rt></ruby>は<ruby>暑<rt>あつ</rt></ruby>いと<ruby>思<rt>おも</rt></ruby>います。"], examples_en: ["I think it will rain tomorrow.", "I think it's hot today."] }
      ],
      followup: ["好きな天気はどれですか？", "雨の日は何をしますか？", "あなたの国の天気はどうですか？"]
    },
    {
      japanese: "<ruby>週末<rt>しゅうまつ</rt></ruby>は<ruby>何<rt>なに</rt></ruby>をしましたか？",
      english: "What did you do on the weekend?",
      vocab: ["週末 (weekend)", "映画 (movie)", "買い物 (shopping)", "友達 (friend)", "家 (home)"],
      grammar: [
        { pattern: "〜をしました", usage: "<ruby>過去<rt>かこ</rt></ruby>にしたことを<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used to say what you did in the past", examples: ["<ruby>買<rt>か</rt></ruby>い<ruby>物<rt>もの</rt></ruby>をしました。", "<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ました。"], examples_en: ["I went shopping.", "I watched a movie."] },
        { pattern: "〜に行きました", usage: "<ruby>過去<rt>かこ</rt></ruby>に<ruby>行<rt>い</rt></ruby>った<ruby>場所<rt>ばしょ</rt></ruby>を<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used to say a place you went to in the past", examples: ["<ruby>公園<rt>こうえん</rt></ruby>に<ruby>行<rt>い</rt></ruby>きました。", "スーパーに<ruby>行<rt>い</rt></ruby>きました。"], examples_en: ["I went to the park.", "I went to the supermarket."] },
        { pattern: "〜で〜しました", usage: "どこで<ruby>何<rt>なに</rt></ruby>をしたかを<ruby>言<rt>い</rt></ruby>うとき", usage_en: "Used to say where you did something", examples: ["<ruby>家<rt>いえ</rt></ruby>で<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ました。", "<ruby>図書館<rt>としょかん</rt></ruby>で<ruby>勉強<rt>べんきょう</rt></ruby>しました。"], examples_en: ["I watched a movie at home.", "I studied at the library."] }
      ],
      followup: ["誰と行きましたか？", "楽しかったですか？", "また行きたいですか？"]
    },
    {
      japanese: "<ruby>好<rt>す</rt></ruby>きな<ruby>季節<rt>きせつ</rt></ruby>はいつですか？",
      english: "What is your favorite season?",
      vocab: ["春 (spring)", "夏 (summer)", "秋 (autumn)", "冬 (winter)", "好き (like)"],
      grammar: [

const topicCategories = {
  beginner:     ['food','food','daily','hobby','daily','daily','hobby','food','daily','hobby','hobby','hobby','food','daily','daily','daily','daily','hobby','travel','family'],
  intermediate: ['hobby','thoughts','hobby','travel','hobby','work','culture','hobby','hobby','travel','thoughts','food','hobby','hobby','hobby','thoughts','travel','thoughts','thoughts','thoughts'],
  advanced:     ['thoughts','culture','thoughts','thoughts','culture','work','culture','thoughts','thoughts','thoughts','culture','work','culture','thoughts','thoughts','culture','thoughts','culture','work','thoughts']
};
const categoryLabels = { all: 'すべて', food: '食べ物', daily: '日常', hobby: '趣味', travel: '旅行', family: '家族', thoughts: '考え方', work: '仕事', culture: '文化' };
const allCatOrder = ['all','food','daily','hobby','travel','family','thoughts','work','culture'];

let currentLevel = 'beginner';
let currentCategory = 'all';
let usedTopics = new Set();
let currentTopicData = null;
let sessionHistory = [];
let favorites = JSON.parse(localStorage.getItem('kaiwa_favs') || '[]');
let timerInterval = null;

function setLevel(level, btn) {
  if (!topics[level] || topics[level].length === 0) {
    alert('このレベルのネタはまだ準備中です。');
    return;
  }
  currentLevel = level;
  currentCategory = 'all';
  usedTopics.clear();
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCategoryButtons();
  showTopic();
}

function getFilteredPool() {
  const pool = topics[currentLevel];
  if (currentCategory === 'all') return pool;
  const cats = topicCategories[currentLevel];
  const filtered = pool.filter((_, i) => cats[i] === currentCategory);
  return filtered.length > 0 ? filtered : pool;
}

function getRandomTopic() {
  const pool = getFilteredPool();
  let available = pool.filter(t => !usedTopics.has(t.japanese));
  if (available.length === 0) { usedTopics.clear(); available = [...pool]; }
  const topic = available[Math.floor(Math.random() * available.length)];
  usedTopics.add(topic.japanese);
  return topic;
}

function setCategory(cat) {
  currentCategory = cat;
  usedTopics.clear();
  updateCategoryButtons();
  showTopic();
}

function updateCategoryButtons() {
  const cats = topicCategories[currentLevel];
  const usedCats = new Set(cats);
  const available = allCatOrder.filter(c => c === 'all' || usedCats.has(c));
  document.getElementById('cat-selector').innerHTML = available.map(cat =>
    `<button class="cat-btn${currentCategory === cat ? ' active' : ''}" onclick="setCategory('${cat}')">${categoryLabels[cat]}</button>`
  ).join('');
}

function showTopic() {
  const topic = getRandomTopic();
  currentTopicData = topic;
  document.getElementById('topic-text').innerHTML = topic.japanese;
  document.getElementById('english-text').textContent = topic.english;

  document.getElementById('vocab-tags').innerHTML =
    topic.vocab.map(v => `<span class="tag">${v}</span>`).join('');

  const hasClickable = topic.grammar.some(g => typeof g === 'object');
  document.getElementById('grammar-hint-note').textContent = hasClickable ? '（タップで使い方・例文を確認）' : '';
  document.getElementById('grammar-tags').innerHTML =
    topic.grammar.map((g, i) => {
      if (typeof g === 'string') return `<span class="tag grammar">${g}</span>`;
      return `<span class="tag grammar grammar-clickable" onclick="showGrammarModal(${i})">${g.pattern}</span>`;
    }).join('');

  document.getElementById('followup-tags').innerHTML =
    (topic.followup || []).map(q => `<span class="tag followup">${q}</span>`).join('');

  closeAll();

  const levelLabel = { beginner: '初級', intermediate: '中級', advanced: '上級' };
  const filteredPool = getFilteredPool();
  const totalCount = topics[currentLevel].length;
  const countText = currentCategory === 'all'
    ? `${levelLabel[currentLevel]} / 全${totalCount}問`
    : `${levelLabel[currentLevel]} / ${categoryLabels[currentCategory]} ${filteredPool.length}問`;
  document.getElementById('topic-count').textContent = countText;

  sessionHistory.push({ japanese: topic.japanese, level: currentLevel });
  document.getElementById('history-count').textContent = sessionHistory.length;
  if (document.getElementById('history-panel').classList.contains('open')) renderHistory();

  updateFavBtn();
}

function toggleAccordion(type) {
  const btn = document.getElementById(`${type}-btn`);
  const content = document.getElementById(`${type}-content`);
  const isOpen = btn.classList.contains('open');
  closeAll();
  if (!isOpen) {
    btn.classList.add('open');
    content.classList.add('open');
  }
}

function closeAll() {
  ['eng', 'hint', 'followup'].forEach(type => {
    document.getElementById(`${type}-btn`).classList.remove('open');
    document.getElementById(`${type}-content`).classList.remove('open');
  });
}

function next() { showTopic(); }
function skip() { showTopic(); }

// ---- 文型モーダル ----
function showGrammarModal(idx) {
  const g = currentTopicData.grammar[idx];
  if (!g || typeof g === 'string') return;
  document.getElementById('modal-pattern').textContent = g.pattern;
  document.getElementById('modal-usage').innerHTML =
    `<div>${g.usage}</div><div class="modal-usage-en">${g.usage_en}</div>`;
  document.getElementById('modal-examples').innerHTML =
    g.examples.map((e, i) => `
      <div class="modal-example">
        <div>${e}</div>
        <div class="modal-example-en">${g.examples_en[i]}</div>
      </div>`).join('');
  document.getElementById('grammar-modal').classList.add('open');
}

function closeGrammarModal(e) {
  if (!e || e.target === document.getElementById('grammar-modal')) {
    document.getElementById('grammar-modal').classList.remove('open');
  }
}

// ---- お気に入り ----
function updateFavBtn() {
  if (!currentTopicData) return;
  const isFav = favorites.some(f => f.japanese === currentTopicData.japanese);
  const btn = document.getElementById('fav-btn');
  btn.textContent = isFav ? '⭐' : '☆';
  btn.title = isFav ? 'お気に入りから削除' : 'お気に入りに追加';
}

function toggleFavorite() {
  if (!currentTopicData) return;
  const idx = favorites.findIndex(f => f.japanese === currentTopicData.japanese);
  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    favorites.push({ japanese: currentTopicData.japanese, english: currentTopicData.english, level: currentLevel });
  }
  localStorage.setItem('kaiwa_favs', JSON.stringify(favorites));
  document.getElementById('fav-count').textContent = favorites.length;
  updateFavBtn();
  if (document.getElementById('fav-panel').classList.contains('open')) renderFavPanel();
}

function removeFav(idx) {
  favorites.splice(idx, 1);
  localStorage.setItem('kaiwa_favs', JSON.stringify(favorites));
  document.getElementById('fav-count').textContent = favorites.length;
  updateFavBtn();
  renderFavPanel();
}

// ---- タイマー ----
function startTimer(minutes) {
  if (timerInterval) clearInterval(timerInterval);
  let seconds = minutes * 60;
  const display = document.getElementById('timer-display');
  const stopBtn = document.getElementById('timer-stop');
  display.className = 'timer-display running';
  stopBtn.style.display = 'inline-block';
  function tick() {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (seconds <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      display.textContent = '終了！';
      display.className = 'timer-display done';
      stopBtn.style.display = 'none';
      return;
    }
    seconds--;
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-display').textContent = '--:--';
  document.getElementById('timer-display').className = 'timer-display';
  document.getElementById('timer-stop').style.display = 'none';
}

// ---- 履歴・パネル ----
function togglePanel(id) {
  const panel = document.getElementById(id);
  const isOpen = panel.classList.contains('open');
  document.getElementById('history-panel').classList.remove('open');
  document.getElementById('fav-panel').classList.remove('open');
  if (!isOpen) {
    panel.classList.add('open');
    if (id === 'history-panel') renderHistory();
    if (id === 'fav-panel') renderFavPanel();
  }
}

function renderHistory() {
  const panel = document.getElementById('history-panel');
  const levelLabel = { beginner: '初級', intermediate: '中級', advanced: '上級' };
  if (sessionHistory.length === 0) {
    panel.innerHTML = '<div class="panel-title">📋 今日使ったネタ</div><div class="empty-msg">まだネタを使っていません</div>';
    return;
  }
  panel.innerHTML = '<div class="panel-title">📋 今日使ったネタ</div>' +
    [...sessionHistory].reverse().map((item, i) => {
      const tmp = document.createElement('div');
      tmp.innerHTML = item.japanese;
      return `<div class="history-item">
        <span class="history-num">${sessionHistory.length - i}</span>
        <span class="level-tag">${levelLabel[item.level]}</span>
        <span>${tmp.textContent}</span>
      </div>`;
    }).join('');
}

function renderFavPanel() {
  const panel = document.getElementById('fav-panel');
  const levelLabel = { beginner: '初級', intermediate: '中級', advanced: '上級' };
  if (favorites.length === 0) {
    panel.innerHTML = '<div class="panel-title">⭐ お気に入り</div><div class="empty-msg">☆ を押してネタを保存できます</div>';
    return;
  }
  panel.innerHTML = '<div class="panel-title">⭐ お気に入り</div>' +
    favorites.map((item, i) => {
      const tmp = document.createElement('div');
      tmp.innerHTML = item.japanese;
      return `<div class="fav-item">
        <div class="fav-item-left">
          <span class="level-tag">${levelLabel[item.level] || ''}</span>
          <span>${tmp.textContent}</span>
        </div>
        <button class="fav-del" onclick="removeFav(${i})" title="削除">✕</button>
      </div>`;
    }).join('');
}
