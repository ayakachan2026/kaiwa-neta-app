<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会話ネタジェネレーター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 { font-size: 1.4rem; color: #555; letter-spacing: 0.05em; margin-bottom: 24px; }

    .level-selector { display: flex; gap: 12px; margin-bottom: 32px; }

    .level-btn {
      padding: 10px 28px;
      border: 2px solid #ccc;
      border-radius: 999px;
      background: white;
      font-size: 1rem;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
      font-family: inherit;
    }
    .level-btn:hover { border-color: #4A90D9; color: #4A90D9; }
    .level-btn.active { background: #4A90D9; border-color: #4A90D9; color: white; font-weight: bold; }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 680px;
      padding: 48px 40px 32px;
      margin-bottom: 20px;
    }

    .topic-label { font-size: 0.8rem; color: #aaa; letter-spacing: 0.1em; margin-bottom: 20px; }

    .topic-text {
      font-size: 2rem;
      color: #222;
      line-height: 2.8;
      margin-bottom: 32px;
      min-height: 80px;
    }

    rt { font-size: 0.5em; color: #555; font-weight: normal; vertical-align: top; }

    .accordion { border-top: 1px solid #eee; }

    .accordion-btn {
      width: 100%;
      padding: 16px 0;
      background: none;
      border: none;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 0.95rem;
      color: #4A90D9;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: inherit;
      transition: color 0.2s;
    }
    .accordion-btn:hover { color: #2a70b9; }
    .accordion-btn .arrow { transition: transform 0.3s; font-style: normal; }
    .accordion-btn.open .arrow { transform: rotate(180deg); }

    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .accordion-content.open { max-height: 300px; }
    .accordion-inner { padding: 16px 0 20px; }

    .english-text { font-size: 1.3rem; color: #444; line-height: 1.6; }

    .hint-section { margin-bottom: 12px; }
    .hint-label { font-size: 0.8rem; color: #aaa; font-weight: bold; letter-spacing: 0.08em; margin-bottom: 8px; }
    .hint-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { background: #f0f4f8; border-radius: 999px; padding: 5px 14px; font-size: 0.9rem; color: #444; }
    .tag.grammar { background: #fff8e8; color: #b07d00; }

    .btn-row { display: flex; gap: 12px; width: 100%; max-width: 680px; }
    .btn { flex: 1; padding: 16px; border-radius: 14px; font-size: 1rem; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-skip { background: white; color: #888; border: 2px solid #ddd; }
    .btn-skip:hover { border-color: #aaa; color: #555; }
    .btn-next { background: #4A90D9; color: white; font-weight: bold; font-size: 1.1rem; }
    .btn-next:hover { background: #2a70b9; }

    .topic-count { margin-top: 16px; font-size: 0.8rem; color: #bbb; }
  </style>
</head>
<body>

  <h1>会話ネタジェネレーター</h1>

  <div class="level-selector">
    <button class="level-btn active" onclick="setLevel('beginner', this)">初級</button>
    <button class="level-btn" onclick="setLevel('intermediate', this)">中級</button>
    <button class="level-btn" onclick="setLevel('advanced', this)">上級</button>
  </div>

  <div class="card">
    <div class="topic-label">TODAY'S TOPIC</div>
    <div class="topic-text" id="topic-text">ボタンを<ruby>押<rt>お</rt></ruby>してネタを<ruby>出<rt>だ</rt></ruby>してください。</div>

    <div class="accordion">
      <button class="accordion-btn" id="eng-btn" onclick="toggleAccordion('eng')">
        英語訳を見る <i class="arrow">▼</i>
      </button>
      <div class="accordion-content" id="eng-content">
        <div class="accordion-inner">
          <div class="english-text" id="english-text">—</div>
        </div>
      </div>

      <button class="accordion-btn" id="hint-btn" onclick="toggleAccordion('hint')">
        💡 ヒントを見る（単語・文型） <i class="arrow">▼</i>
      </button>
      <div class="accordion-content" id="hint-content">
        <div class="accordion-inner">
          <div class="hint-section">
            <div class="hint-label">📝 単語</div>
            <div class="hint-tags" id="vocab-tags"></div>
          </div>
          <div class="hint-section">
            <div class="hint-label">📐 文型</div>
            <div class="hint-tags" id="grammar-tags"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-skip" onclick="skip()">スキップ</button>
    <button class="btn btn-next" onclick="next()">次のネタ 🎲</button>
  </div>
  <div class="topic-count" id="topic-count"></div>

let currentLevel = 'beginner';
let usedIndices = [];

function setLevel(level, btn) {
  currentLevel = level;
  usedIndices = [];
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showTopic();
}

function getRandomTopic() {
  const pool = topics[currentLevel];
  if (usedIndices.length >= pool.length) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); }
  while (usedIndices.includes(idx));
  usedIndices.push(idx);
  return pool[idx];
}

function showTopic() {
  const topic = getRandomTopic();
  document.getElementById('topic-text').innerHTML = topic.japanese;
  document.getElementById('english-text').textContent = topic.english;

  document.getElementById('vocab-tags').innerHTML =
    topic.vocab.map(v => `<span class="tag">${v}</span>`).join('');
  document.getElementById('grammar-tags').innerHTML =
    topic.grammar.map(g => `<span class="tag grammar">${g}</span>`).join('');

  closeAll();

  const levelLabel = { beginner: '初級', intermediate: '中級', advanced: '上級' };
  const pool = topics[currentLevel];
  document.getElementById('topic-count').textContent =
    `${levelLabel[currentLevel]} / 全${pool.length}問`;
}

function toggleAccordion(type) {
  const btn = document.getElementById(`${type}-btn`);
  const content = document.getElementById(`${type}-content`);
  const isOpen = btn.classList.contains('open');
  closeAll();
  if (!isOpen) {
    btn.classList.add('open');
    content.classList.add('open');
  }
}

function closeAll() {
  ['eng', 'hint'].forEach(type => {
    document.getElementById(`${type}-btn`).classList.remove('open');
    document.getElementById(`${type}-content`).classList.remove('open');
  });
}

function next() { showTopic(); }
function skip() { showTopic(); }

showTopic();
</script>
